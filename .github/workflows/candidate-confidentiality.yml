name: Candidate-facing confidentiality finalizer

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sanitize-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Install audit tools
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint poppler-utils
          python -m pip install --disable-pip-version-check beautifulsoup4
      - name: Neutralize internal orchestration references
        run: |
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup
          import re
          text_extensions={'.html','.md','.json','.css','.js','.svg','.txt','.yml','.yaml'}
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path.suffix.lower() not in text_extensions:
                  continue
              text=path.read_text(errors='replace')
              if path.suffix.lower()=='.html':
                  soup=BeautifulSoup(text,'html.parser')
                  for tag in soup.find_all('meta',attrs={'name':True}):
                      if tag.get('name','').lower().startswith('roleforge:'): tag.decompose()
                  text=str(soup)
              for old,new in {
                  'RoleForge inference':'Candidate inference',
                  'RoleForge campaign':'candidate campaign',
                  'RoleForge contracts':'campaign contracts',
                  'RoleForge component system':'campaign component system',
                  'RoleForge audit':'campaign audit',
              }.items(): text=text.replace(old,new)
              text=re.sub(r'(?i)roleforge','candidate campaign system',text)
              path.write_text(text)
          PY
      - name: Regenerate PDFs from sanitized source
        run: |
          mkdir -p docs qa
          weasyprint resume.html docs/Russell-Dudek-KPMG-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-KPMG-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-KPMG-Interview-Brief.pdf
          weasyprint 90-day-plan.html docs/Russell-Dudek-KPMG-90-Day-Plan.pdf
      - name: Record exact confidentiality matches
        run: |
          rm -f .github/workflows/candidate-confidentiality.yml .confidentiality-trigger
          find . -type f -not -path './.git/*' -iname '*roleforge*' | sort > qa/confidentiality-filename-matches.txt || true
          grep -RniE 'roleforge' . --exclude-dir=.git --exclude='*.pdf' | sort > qa/confidentiality-source-matches.txt || true
          : > qa/confidentiality-pdf-matches.txt
          for pdf in docs/*.pdf; do
            if { pdftotext "$pdf" -; pdfinfo "$pdf"; } | grep -niE 'roleforge' > /tmp/pdf-match.txt; then
              echo "### $pdf" >> qa/confidentiality-pdf-matches.txt
              cat /tmp/pdf-match.txt >> qa/confidentiality-pdf-matches.txt
            fi
          done
          python - <<'PY'
          import json, subprocess
          from pathlib import Path
          pdfs={'resume':('docs/Russell-Dudek-KPMG-Resume.pdf',2),'coverLetter':('docs/Russell-Dudek-KPMG-Cover-Letter.pdf',1),'interviewBrief':('docs/Russell-Dudek-KPMG-Interview-Brief.pdf',2),'entryPlan':('docs/Russell-Dudek-KPMG-90-Day-Plan.pdf',2)}
          def lines(path):
              p=Path(path)
              return [x for x in p.read_text(errors='replace').splitlines() if x.strip()] if p.exists() else []
          out={'auditDate':'2026-07-13','filenameMatches':lines('qa/confidentiality-filename-matches.txt'),'sourceMatches':lines('qa/confidentiality-source-matches.txt'),'pdfMatches':lines('qa/confidentiality-pdf-matches.txt'),'pdfs':{}}
          for key,(path,expected) in pdfs.items():
              info=subprocess.check_output(['pdfinfo',path],text=True)
              pages=int(next(x.split(':',1)[1] for x in info.splitlines() if x.startswith('Pages:')).strip())
              out['pdfs'][key]={'pages':pages,'expectedPages':expected,'passed':pages==expected,'bytes':Path(path).stat().st_size}
          out['passed']=not out['filenameMatches'] and not out['sourceMatches'] and not out['pdfMatches'] and all(x['passed'] for x in out['pdfs'].values())
          Path('qa/candidate-facing-confidentiality-audit.json').write_text(json.dumps(out,indent=2))
          print(json.dumps(out,indent=2))
          PY
      - name: Commit diagnostic confidentiality result to audit branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record candidate-facing confidentiality audit'
          git push origin HEAD:${HEAD_REF}
