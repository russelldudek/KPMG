name: Materialize RoleForge overlay

on:
  push:
    branches: [main]
    paths:
      - ".roleforge-overlay/chunk-*"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Materialize audited campaign
        run: |
          cat .roleforge-overlay/chunk-* | base64 -d > /tmp/roleforge-overlay.zip
          unzip -o /tmp/roleforge-overlay.zip -d .
          rm -rf .roleforge-overlay
      - name: Commit finished campaign
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize audited KPMG RoleForge campaign"
          git push
