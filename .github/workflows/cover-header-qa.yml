name: Cover letter header QA

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'agent/kpmg-cover-header-match'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Install PDF verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint poppler-utils
          python -m pip install --disable-pip-version-check pymupdf pillow beautifulsoup4
      - name: Verify matching header structure
        run: |
          python - <<'PY'
          from bs4 import BeautifulSoup
          from pathlib import Path

          resume = BeautifulSoup(Path('resume.html').read_text(), 'html.parser')
          letter = BeautifulSoup(Path('cover-letter.html').read_text(), 'html.parser')
          rh = resume.select_one('.resume-header-primary')
          lh = letter.select_one('.resume-header-primary')
          assert rh and lh
          assert [x.name for x in rh.find_all(recursive=False)] == [x.name for x in lh.find_all(recursive=False)]
          assert [x.get('class') for x in rh.find_all(recursive=False)] == [x.get('class') for x in lh.find_all(recursive=False)]
          assert rh.get_text(' ', strip=True) == lh.get_text(' ', strip=True)
          assert letter.select_one('.letter-head') is None
          PY
      - name: Generate and compare PDFs
        run: |
          mkdir -p docs qa
          weasyprint resume.html /tmp/KPMG-Resume-QA.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-KPMG-Cover-Letter.pdf
          test "$(pdfinfo /tmp/KPMG-Resume-QA.pdf | awk '/Pages/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Cover-Letter.pdf | awk '/Pages/ {print $2}')" = "1"
          pdftotext docs/Russell-Dudek-KPMG-Cover-Letter.pdf - | grep -q '412.287.8640'
          pdftotext docs/Russell-Dudek-KPMG-Cover-Letter.pdf - | grep -q 'russelldudek.github.io/KPMG/'
          python - <<'PY'
          import fitz, json
          from pathlib import Path
          from PIL import Image, ImageChops

          resume_path = '/tmp/KPMG-Resume-QA.pdf'
          letter_path = 'docs/Russell-Dudek-KPMG-Cover-Letter.pdf'
          labels = [
              'Russell Dudek',
              'Technology Innovation Leader',
              'Target role: Associate Director, Technology Innovation',
              'KPMG Digital Nexus',
              'Pittsburgh, Pennsylvania',
              '412.287.8640',
              'russelldudek@gmail.com',
              'linkedin.com/in/russelldudek',
              'russelldudek.github.io/KPMG/'
          ]

          def boxes(path):
              page = fitz.open(path)[0]
              out = {}
              for label in labels:
                  hits = page.search_for(label)
                  assert hits, f'missing {label} in {path}'
                  out[label] = [round(v, 2) for v in hits[0]]
              return out

          rb = boxes(resume_path)
          lb = boxes(letter_path)
          for label in labels:
              delta = max(abs(a-b) for a,b in zip(rb[label], lb[label]))
              assert delta <= 1.5, f'{label} geometry differs by {delta}pt: {rb[label]} vs {lb[label]}'

          max_y = max(v[3] for v in rb.values()) + 10
          matrix = fitz.Matrix(2, 2)
          def crop(path):
              page = fitz.open(path)[0]
              pix = page.get_pixmap(matrix=matrix, clip=fitz.Rect(0, 0, page.rect.width, max_y), alpha=False)
              return Image.frombytes('RGB', [pix.width, pix.height], pix.samples)
          ri, li = crop(resume_path), crop(letter_path)
          assert ri.size == li.size
          diff = ImageChops.difference(ri, li)
          assert diff.getbbox() is None, 'Rendered header pixels differ'
          ri.save('qa/resume-header-reference.png')
          li.save('qa/cover-letter-header.png')

          result = {
              'headerMarkupMatch': True,
              'headerTextMatch': True,
              'headerGeometryMatch': True,
              'headerPixelMatch': True,
              'coverLetterPages': 1,
              'resumeReferencePages': 2,
              'coordinates': rb
          }
          Path('qa/cover-header-audit.json').write_text(json.dumps(result, indent=2))
          PY
      - name: Confidentiality scan
        run: |
          ! grep -Rin --exclude-dir=.git --exclude='*.pdf' --exclude='*.png' 'roleforge' .
          ! pdftotext docs/Russell-Dudek-KPMG-Cover-Letter.pdf - | grep -i 'roleforge'
          ! pdfinfo docs/Russell-Dudek-KPMG-Cover-Letter.pdf | grep -i 'roleforge'
      - name: Commit verified cover letter PDF and evidence
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/Russell-Dudek-KPMG-Cover-Letter.pdf qa/cover-header-audit.json qa/resume-header-reference.png qa/cover-letter-header.png
          git commit -m 'Publish matched cover letter header and PDF'
          git push origin HEAD:${{ github.head_ref }}
