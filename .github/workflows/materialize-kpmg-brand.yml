name: Diagnose KPMG Brand Payload

on:
  pull_request:
    branches: [main]
    paths:
      - '.roleforge-brand/**'
      - 'brand-repair-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || 'roleforge-kpmg-brand-repair' }}
          fetch-depth: 0

      - name: Decode payload and write diagnostic
        shell: bash
        run: |
          mkdir -p audit
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib, re, tarfile, traceback

          lines = []
          ok = True
          try:
              parts = sorted(Path('.roleforge-brand').glob('chunk-*.txt'), key=lambda p: int(re.findall(r'\d+', p.stem)[-1]))
              lines.append(f'chunk_count={len(parts)}')
              if not parts:
                  raise RuntimeError('no chunks found')
              encoded = ''
              for p in parts:
                  text = ''.join(p.read_text(encoding='utf-8').split())
                  encoded += text
                  lines.append(f'{p.name}: chars={len(text)} sha256={hashlib.sha256(text.encode()).hexdigest()}')
              lines.append(f'combined_chars={len(encoded)}')
              raw = base64.b64decode(encoded, validate=False)
              archive = Path('/tmp/kpmg-brand-overlay.tar.gz')
              archive.write_bytes(raw)
              lines.append(f'archive_bytes={len(raw)}')
              lines.append(f'archive_sha256={hashlib.sha256(raw).hexdigest()}')
              lines.append(f'archive_signature={raw[:16].hex()}')
              with tarfile.open(archive, 'r:gz') as tf:
                  members = tf.getmembers()
                  lines.append(f'tar_members={len(members)}')
                  lines.extend(f'member={m.name} size={m.size}' for m in members[:100])
          except Exception as exc:
              ok = False
              lines.append(f'error={type(exc).__name__}: {exc}')
              lines.append(traceback.format_exc())
          lines.append(f'result={"success" if ok else "failure"}')
          Path('audit/brand-payload-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines))
          PY

      - name: Commit diagnostic to repair branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit/brand-payload-diagnostic.txt
          git commit -m 'Record KPMG brand payload diagnostic' || true
          git push origin HEAD:${{ github.event_name == 'pull_request' && github.head_ref || 'roleforge-kpmg-brand-repair' }}