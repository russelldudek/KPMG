name: KPMG full-site QA finalizer

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/kpmg-full-site-qa.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install document and audit tools
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint poppler-utils
          python -m pip install --disable-pip-version-check beautifulsoup4
      - name: Normalize all route navigation and assets
        run: |
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup

          routes = [
              ('index.html', 'Vision'),
              ('decision-lab.html', 'Decision lab'),
              ('90-day-plan.html', '90-day plan'),
              ('interview-brief.html', 'Interview brief'),
              ('resume.html', 'Resume'),
              ('cover-letter.html', 'Cover letter'),
          ]
          links = [
              ('index.html', 'Vision'),
              ('decision-lab.html', 'Decision lab'),
              ('90-day-plan.html', '90-day plan'),
              ('interview-brief.html', 'Interview brief'),
              ('resume.html', 'Resume'),
              ('cover-letter.html', 'Cover letter'),
          ]
          for filename, active in routes:
              path = Path(filename)
              soup = BeautifulSoup(path.read_text(), 'html.parser')
              if not soup.find('link', href='site-qa.css'):
                  tag = soup.new_tag('link', rel='stylesheet', href='site-qa.css')
                  soup.head.append(tag)
              nav = soup.find('nav', class_='site-nav')
              replacement = soup.new_tag('nav', attrs={'class':'site-nav','aria-label':'Campaign navigation'})
              brand = soup.new_tag('a', href='index.html', attrs={'class':'candidate-nav-brand','aria-label':'Russell Dudek KPMG Technology Innovation candidate campaign'})
              strong = soup.new_tag('strong'); strong.string = 'Russell Dudek'
              small = soup.new_tag('small'); small.string = 'KPMG Technology Innovation candidate campaign'
              brand.extend([strong, small]); replacement.append(brand)
              toggle = soup.new_tag('button', attrs={'class':'nav-toggle','type':'button','aria-controls':'primary-nav','aria-expanded':'false'})
              span = soup.new_tag('span'); span.string = 'Menu'
              icon = soup.new_tag('i', attrs={'aria-hidden':'true'})
              toggle.extend([span, icon]); replacement.append(toggle)
              menu = soup.new_tag('div', id='primary-nav', attrs={'class':'nav-links'})
              for href, label in links:
                  link = soup.new_tag('a', href=href)
                  link.string = label
                  if label == active: link['aria-current'] = 'page'
                  menu.append(link)
              replacement.append(menu)
              if nav: nav.replace_with(replacement)
              else: soup.body.insert(1, replacement)
              if filename != 'index.html' and not soup.find('script', src='app.js'):
                  script = soup.new_tag('script', src='app.js', defer=True)
                  soup.body.append(script)
              path.write_text(str(soup))
          Path('brand-runtime.js').unlink(missing_ok=True)
          PY
      - name: Regenerate all downloadable PDFs
        run: |
          mkdir -p docs
          weasyprint resume.html docs/Russell-Dudek-KPMG-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-KPMG-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-KPMG-Interview-Brief.pdf
          weasyprint 90-day-plan.html docs/Russell-Dudek-KPMG-90-Day-Plan.pdf
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Resume.pdf | awk '/Pages/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Cover-Letter.pdf | awk '/Pages/ {print $2}')" = "1"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Interview-Brief.pdf | awk '/Pages/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-90-Day-Plan.pdf | awk '/Pages/ {print $2}')" = "2"
          pdftotext docs/Russell-Dudek-KPMG-Resume.pdf - | grep -q '412.287.8640'
          pdftotext docs/Russell-Dudek-KPMG-Cover-Letter.pdf - | grep -q 'russelldudek.github.io/KPMG/'
      - name: Source and navigation audit
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from bs4 import BeautifulSoup
          routes=['index.html','decision-lab.html','90-day-plan.html','interview-brief.html','resume.html','cover-letter.html']
          results={}
          for route in routes:
              soup=BeautifulSoup(Path(route).read_text(),'html.parser')
              ids=[x.get('id') for x in soup.find_all(id=True)]
              broken=[]
              for a in soup.find_all('a',href=True):
                  href=a['href']
                  if href.startswith(('http:','https:','mailto:','tel:','#')): continue
                  if not Path(href.split('#')[0]).exists(): broken.append(href)
              results[route]={
                  'h1_count':len(soup.find_all('h1')),
                  'nav_count':len(soup.find_all('nav',class_='site-nav')),
                  'candidate_nav_count':len(soup.find_all('a',class_='candidate-nav-brand')),
                  'active_route_count':len(soup.select('[aria-current="page"]')),
                  'duplicate_ids':sorted({x for x in ids if ids.count(x)>1}),
                  'broken_internal_links':broken,
                  'site_qa_loaded':bool(soup.find('link',href='site-qa.css')),
              }
              assert results[route]['h1_count']==1
              assert results[route]['nav_count']==1
              assert results[route]['candidate_nav_count']==1
              assert results[route]['active_route_count']==1
              assert not results[route]['duplicate_ids']
              assert not results[route]['broken_internal_links']
          Path('qa').mkdir(exist_ok=True)
          Path('qa/repository-finalizer-audit.json').write_text(json.dumps(results,indent=2))
          PY
      - name: Commit finalized site and downloads
        run: |
          rm -f .github/workflows/kpmg-full-site-qa.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize KPMG full-site QA and downloadable PDFs'
          git push
