name: Apply RoleForge Brand Fidelity

on:
  pull_request:
    branches: [main]
    paths:
      - 'brand-system-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brand-and-audit:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || 'roleforge-kpmg-brand-diagnostic' }}
          fetch-depth: 0

      - name: Build KPMG brand asset package and patch campaign
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/brand audit
          curl --fail --location --retry 4 --retry-all-errors \
            'https://upload.wikimedia.org/wikipedia/commons/d/db/KPMG_blue_logo.svg' \
            -o assets/brand/kpmg-logo.svg
          grep -qi '<svg' assets/brand/kpmg-logo.svg

          cat > brand-intelligence.md <<'EOF'
          # KPMG Brand Intelligence

          ## Identity and provenance
          - Official KPMG wordmark: `assets/brand/kpmg-logo.svg`
          - Retrieval mirror: https://upload.wikimedia.org/wikipedia/commons/d/db/KPMG_blue_logo.svg
          - Commons source record: https://commons.wikimedia.org/wiki/File:KPMG_blue_logo.svg
          - Original source recorded by Commons: https://kpmg.com/xx/en.html
          - Usage: nominative identification of the target employer only. The mark remains unmodified and is paired with an immediate independent-candidate qualifier.
          - Trademark note: the mark remains subject to KPMG trademark rights; this candidate campaign does not imply sponsorship, approval, employment, or endorsement.

          ## Color system
          - `#00338D` — source-sampled KPMG primary blue.
          - `#005EB8` — source-sampled supporting blue.
          - `#0091DA` — source-sampled light blue.
          - `#E5F2F8`, `#F4F7FA`, and `#FFFFFF` — candidate-neutral accessibility tints.
          - `#007C91` — candidate-original teal reserved for positive proof states and subordinate to the KPMG blue recognition layer.

          ## Typography decision
          KPMG's public identity uses a disciplined neo-grotesque sans-serif character. Proprietary corporate font files are not copied or committed. The campaign uses `Arial Nova`, `Helvetica Neue`, Arial, and system sans-serif as licensed/system substitutes, reproducing the public character through restrained weight, compact tracking, and editorial hierarchy. The substitute is not represented as an official KPMG font.

          ## Visual grammar
          Strong KPMG blue fields, white space, rectilinear frames echoing the four-box wordmark, thin rules, compact labels, and blue-spectrum data graphics. The GenAI Proving Ground remains candidate-original and role-derived. The official wordmark is never animated, recolored, distorted, cropped, or fused into a candidate logo.

          ## Surface decisions
          - Candidate vision: full KPMG recognition layer above the fold plus the role-derived Proving Ground.
          - Navigation: restrained official wordmark with `Candidate vision · by Russell Dudek`.
          - Résumé and cover letter: conservative white-paper layout with restrained KPMG identifier, blue rules, and ATS-readable typography.
          - Interview brief and 90-day plan: consulting-report hierarchy with the same KPMG tokens and role-specific diagrams.
          EOF

          cat > brand-tokens.css <<'EOF'
          :root{
            --brand-primary:#00338d;--brand-secondary:#005eb8;--brand-accent:#0091da;--brand-dark:#061f3f;--brand-pale:#e5f2f8;--brand-mist:#f4f7fa;--brand-light:#ffffff;--campaign-accent:#007c91;
            --ink:#061f3f!important;--ink-2:#173a63!important;--blue:#00338d!important;--blue-2:#005eb8!important;--violet:#005eb8!important;--pink:#0091da!important;--sky:#e5f2f8!important;--lav:#eef6fa!important;--ice:#f4f7fa!important;--paper:#ffffff!important;--line:#b8cadd!important;--muted:#51677d!important;--green:#007c91!important;--shadow:0 24px 70px rgba(0,51,141,.14)!important;--radius-xl:8px!important;--radius-lg:5px!important;--radius-md:3px!important;
          }
          html{accent-color:var(--brand-primary)}body{font-family:"Arial Nova","Helvetica Neue",Arial,ui-sans-serif,sans-serif!important;background:var(--brand-mist)}body::before{background:linear-gradient(rgba(0,51,141,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,51,141,.035) 1px,transparent 1px)!important;background-size:40px 40px!important}h1,h2,h3,.identity,.letter-meta{font-family:"Arial Nova","Helvetica Neue",Arial,ui-sans-serif,sans-serif!important}a:focus-visible,button:focus-visible,input:focus-visible{outline-color:var(--brand-accent)!important}
          .site-nav{background:rgba(255,255,255,.97)!important;border-bottom:4px solid var(--brand-primary)!important;backdrop-filter:blur(14px)}.site-nav::after{content:"";position:absolute;left:0;right:0;bottom:-4px;height:4px;background:linear-gradient(90deg,var(--brand-primary) 0 48%,var(--brand-secondary) 48% 76%,var(--brand-accent) 76%)}.brand.company-nav-lockup{gap:.9rem;color:var(--brand-dark)}.brand.company-nav-lockup img{width:94px;height:auto;display:block}.brand.company-nav-lockup>span{display:grid;gap:.06rem;padding-left:.85rem;border-left:1px solid var(--line)}.brand.company-nav-lockup b{font-size:.66rem;color:var(--brand-primary);letter-spacing:.12em;text-transform:uppercase}.brand.company-nav-lockup small{font-size:.72rem;color:var(--muted);font-weight:700}.nav-links a{border-radius:2px!important;color:var(--brand-dark)}.nav-links a:hover{background:var(--brand-pale)!important;color:var(--brand-primary)}
          .hero{position:relative;background:linear-gradient(100deg,#fff 0 62%,var(--brand-pale) 62% 100%)!important}.hero::before{content:"";position:absolute;left:0;top:0;bottom:0;width:10px;background:linear-gradient(var(--brand-primary),var(--brand-secondary),var(--brand-accent))}.hero-company-lockup{display:flex;align-items:center;gap:1rem;margin:0 0 2.1rem;padding:1rem 1.05rem;border-left:6px solid var(--brand-primary);background:#fff;box-shadow:0 12px 34px rgba(0,51,141,.09);max-width:590px}.hero-company-lockup img{width:126px;height:auto;flex:0 0 auto}.hero-company-lockup div{display:grid;gap:.08rem;padding-left:1rem;border-left:1px solid var(--line)}.hero-company-lockup strong{color:var(--brand-primary);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase}.hero-company-lockup span{font-size:.95rem;font-weight:800;line-height:1.2}.hero-company-lockup small{color:var(--muted);font-size:.72rem}.hero-copy h1{color:var(--brand-primary)!important}.eyebrow{color:var(--brand-primary)!important}.eyebrow::before{border-radius:0!important;background:var(--brand-primary)!important}.btn{border-radius:2px!important}.btn-primary{background:var(--brand-primary)!important;border-color:var(--brand-primary)!important}.btn-primary:hover{background:var(--brand-secondary)!important}.btn-secondary{color:var(--brand-primary)!important;border-color:var(--brand-primary)!important}.hero-thesis span{color:var(--brand-secondary)!important}
          .proving-rig,.boundary-sheet,.brief-card,.score-item,.fact-box{border-radius:4px!important}.proving-rig{border:1px solid #9bb5d1!important;border-top:10px solid var(--brand-primary)!important;background:linear-gradient(145deg,#fff 0%,#f3f8fb 60%,#dcecf5 100%)!important}.rig-topline,.sheet-head{background:var(--brand-primary)!important}.track-line,.system-line span{background:linear-gradient(90deg,var(--brand-primary),var(--brand-secondary),var(--brand-accent))!important}.specimen{border-color:var(--brand-primary)!important;box-shadow:0 0 0 7px rgba(0,94,184,.15),0 0 22px rgba(0,94,184,.45)!important}.specimen i{background:var(--brand-accent)!important}.rig-trace i{background:linear-gradient(90deg,transparent,var(--brand-primary),var(--brand-accent),transparent)!important}.rig-run:hover{background:var(--brand-pale)!important}.moment-band{border-radius:0!important;border-top:7px solid var(--brand-primary)!important}.moment-band a:nth-child(1){background:var(--brand-primary)!important;color:#fff}.moment-band a:nth-child(1) span,.moment-band a:nth-child(1) em{color:#dcecf8!important}.moment-band span{color:var(--brand-secondary)!important}.mandate-section{background:var(--brand-primary)!important}.boundary-section{background:linear-gradient(135deg,#dfeef6,#f7fafd)!important}.balance-board article div i{background:linear-gradient(90deg,var(--brand-primary) 0 48%,var(--brand-dark) 48% 52%,var(--brand-accent) 52%)!important}.boundary-sheet article>b{border-radius:2px!important;background:var(--brand-pale)!important;color:var(--brand-primary)!important}.boundary-sheet article>span{color:var(--brand-secondary)!important}.outcome-tabs button[aria-selected="true"],.lab-tab[aria-selected="true"]{background:var(--brand-primary)!important;color:#fff!important}.instrument-panel,.outcome-console{border-top:7px solid var(--brand-primary)!important}.site-footer{background:var(--brand-dark)!important;border-top:7px solid var(--brand-accent)!important}
          .independent-candidate-note{padding:1rem max(1rem,calc((100vw - 1180px)/2));background:#fff;border-top:1px solid var(--line);font-size:.72rem;color:var(--muted);text-align:center}.document-company-lockup{display:flex;align-items:center;justify-content:flex-end;gap:.75rem;margin:0 0 .85rem auto;color:var(--brand-dark)}.document-company-lockup img{width:76px;height:auto}.document-company-lockup span{display:grid;padding-left:.7rem;border-left:1px solid var(--line);line-height:1.18}.document-company-lockup strong{font-size:.62rem;color:var(--brand-primary);letter-spacing:.1em;text-transform:uppercase}.document-company-lockup small{font-size:.62rem;color:var(--muted)}.print-page,.letter-page,.brief-page{border-top-color:var(--brand-primary)!important}.resume-header,.letter-head,.section-head{border-bottom-color:var(--brand-primary)!important}.resume-section h2,.brief-card h2,.score-item small{color:var(--brand-primary)!important}.capability{border-radius:2px!important;background:var(--brand-pale)!important;border-color:#b9d1e2!important}.download-link{background:var(--brand-primary)!important;color:#fff!important;border-color:var(--brand-primary)!important}.brand-mark{display:none!important}
          @media(max-width:860px){.brand.company-nav-lockup img{width:78px}.brand.company-nav-lockup>span{display:none}.hero{background:#fff!important}.hero-company-lockup{max-width:none}.hero-company-lockup img{width:104px}}@media(max-width:520px){.hero-company-lockup{align-items:flex-start;gap:.7rem;padding:.85rem}.hero-company-lockup img{width:88px}.hero-company-lockup div{padding-left:.7rem}.document-company-lockup{justify-content:flex-start}.document-company-lockup img{width:64px}}
          @media print{.document-company-lockup{margin-bottom:3mm}.document-company-lockup img{width:24mm}.document-company-lockup strong,.document-company-lockup small{font-size:6.5pt}.print-page,.letter-page,.brief-page{border-top:2.2mm solid var(--brand-primary)!important}.independent-candidate-note{display:none!important}}
          @media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;animation:none!important;transition:none!important}}
          EOF

          python3 - <<'PY'
          from pathlib import Path
          import re

          pages=['index.html','decision-lab.html','resume.html','cover-letter.html','interview-brief.html','90-day-plan.html']
          nav='<a class="brand company-nav-lockup" href="index.html"><img src="assets/brand/kpmg-logo.svg" alt="KPMG"><span><b>Candidate vision</b><small>by Russell Dudek</small></span></a>'
          hero='<div class="hero-company-lockup"><img src="assets/brand/kpmg-logo.svg" alt="KPMG"><div><strong>Candidate vision for</strong><span>Associate Director, Technology Innovation</span><small>Independent work by Russell Dudek</small></div></div>'
          doc='<div class="document-company-lockup"><img src="assets/brand/kpmg-logo.svg" alt="KPMG"><span><strong>Candidate vision for Associate Director, Technology Innovation</strong><small>Independent work by Russell Dudek</small></span></div>'
          note='<div class="independent-candidate-note">Independent candidate work by Russell Dudek for discussion with KPMG. Not a KPMG publication; no sponsorship, approval, or endorsement is implied.</div>'

          for name in pages:
              path=Path(name)
              text=path.read_text(encoding='utf-8')
              text=re.sub(r'<link[^>]+href=["\']brand-tokens\.css["\'][^>]*>', '', text)
              text=re.sub(r'(<link[^>]+href=["\']styles\.css["\'][^>]*>)', r'\1<link rel="stylesheet" href="brand-tokens.css">', text, count=1)
              text=re.sub(r'<a class="brand(?: [^"]*)?" href="index\.html">.*?</a>', nav, text, count=1, flags=re.S)
              if name=='index.html':
                  text=re.sub(r'<link[^>]+rel=["\']icon["\'][^>]*>', '<link rel="icon" href="assets/brand/kpmg-logo.svg" type="image/svg+xml">', text, count=1)
                  text=re.sub(r'<div[^>]+class=["\'](?:company-lockup|hero-company-lockup)["\'][^>]*>.*?</div>\s*</div>', hero, text, count=1, flags=re.S)
                  if 'hero-company-lockup' not in text:
                      text=text.replace('<div class="hero-copy">','<div class="hero-copy">'+hero,1)
              elif 'document-company-lockup' not in text:
                  text=re.sub(r'(<main\b[^>]*>)', r'\1'+doc, text, count=1)
              if 'independent-candidate-note' not in text:
                  text=text.replace('</body>',note+'</body>')
              path.write_text(text,encoding='utf-8')
          PY

          grep -qi '#00338d' brand-tokens.css
          grep -q 'assets/brand/kpmg-logo.svg' index.html
          grep -q 'Candidate vision for' index.html
          grep -q 'by Russell Dudek' index.html
          grep -q 'View Cover Letter' resume.html
          grep -q 'View Resume' cover-letter.html
          for page in index.html decision-lab.html 90-day-plan.html interview-brief.html resume.html cover-letter.html; do grep -q 'brand-tokens.css' "$page"; done

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install browser and PDF audit tools
        run: |
          npm install --prefix /tmp/kpmg-audit playwright
          /tmp/kpmg-audit/node_modules/.bin/playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Render full campaign and regenerate PDFs
        shell: bash
        run: |
          python3 -m http.server 4173 >/tmp/kpmg-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          cat > /tmp/kpmg-audit.js <<'JS'
          const { chromium } = require('/tmp/kpmg-audit/node_modules/playwright');
          const fs = require('fs');
          const base = 'http://127.0.0.1:4173/';
          (async()=>{
            const browser=await chromium.launch({headless:true});
            fs.mkdirSync('audit/screenshots',{recursive:true});
            for(const [width,height] of [[1440,900],[1280,800],[768,1024],[390,844]]){
              const page=await browser.newPage({viewport:{width,height}});
              const errors=[];
              page.on('pageerror',e=>errors.push(String(e)));
              page.on('console',m=>{if(m.type()==='error')errors.push(m.text())});
              await page.goto(base+'index.html',{waitUntil:'networkidle'});
              const r=await page.evaluate(()=>{
                const logo=document.querySelector('.hero-company-lockup img[src="assets/brand/kpmg-logo.svg"]');
                const rect=logo?.getBoundingClientRect();
                return{overflow:document.documentElement.scrollWidth>document.documentElement.clientWidth,logoLoaded:!!logo&&logo.complete&&logo.naturalWidth>0,logoAboveFold:!!rect&&rect.top>=0&&rect.bottom<=innerHeight,qualifier:/Independent work by Russell Dudek/i.test(document.body.innerText),primary:getComputedStyle(document.documentElement).getPropertyValue('--brand-primary').trim().toLowerCase()}
              });
              if(r.overflow||!r.logoLoaded||!r.logoAboveFold||!r.qualifier||r.primary!=='#00338d'||errors.length)throw new Error(`${width}x${height} failed ${JSON.stringify({r,errors})}`);
              await page.screenshot({path:`audit/screenshots/index-${width}x${height}.png`,fullPage:true});
              await page.close();
            }
            const context=await browser.newContext({viewport:{width:1280,height:800},reducedMotion:'reduce'});
            const reduced=await context.newPage();
            await reduced.goto(base+'index.html',{waitUntil:'networkidle'});
            await reduced.waitForTimeout(300);
            const running=await reduced.evaluate(()=>document.getAnimations().filter(a=>a.playState==='running').length);
            if(running!==0)throw new Error(`reduced motion left ${running} animations`);
            await reduced.screenshot({path:'audit/screenshots/index-reduced-motion.png',fullPage:true});
            await context.close();
            fs.mkdirSync('docs',{recursive:true});
            for(const [html,pdf] of [['resume.html','docs/Russell-Dudek-KPMG-Resume.pdf'],['cover-letter.html','docs/Russell-Dudek-KPMG-Cover-Letter.pdf'],['interview-brief.html','docs/Russell-Dudek-KPMG-Interview-Brief.pdf'],['90-day-plan.html','docs/Russell-Dudek-KPMG-90-Day-Plan.pdf']]){
              const page=await browser.newPage();
              await page.goto(base+html,{waitUntil:'networkidle'});
              const check=await page.evaluate(()=>({logo:!!document.querySelector('img[src="assets/brand/kpmg-logo.svg"]'),download:document.body.innerText.includes('Download PDF'),company:document.body.innerText.includes('KPMG')}));
              if(!check.logo||!check.download||!check.company)throw new Error(`${html} failed ${JSON.stringify(check)}`);
              await page.emulateMedia({media:'print'});
              await page.pdf({path:pdf,format:'Letter',printBackground:true,margin:{top:'0',right:'0',bottom:'0',left:'0'}});
              await page.close();
            }
            await browser.close();
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node /tmp/kpmg-audit.js
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Resume.pdf | awk '/Pages/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Cover-Letter.pdf | awk '/Pages/ {print $2}')" = "1"
          BRIEF_PAGES="$(pdfinfo docs/Russell-Dudek-KPMG-Interview-Brief.pdf | awk '/Pages/ {print $2}')"
          PLAN_PAGES="$(pdfinfo docs/Russell-Dudek-KPMG-90-Day-Plan.pdf | awk '/Pages/ {print $2}')"
          test "$BRIEF_PAGES" -ge 1
          test "$PLAN_PAGES" -ge 1
          printf 'brief_pages=%s\nplan_pages=%s\n' "$BRIEF_PAGES" "$PLAN_PAGES" > audit/pdf-page-counts.txt

      - name: Record Brand Fidelity audit and commit verified campaign
        shell: bash
        run: |
          BRIEF_PAGES="$(awk -F= '/brief_pages/ {print $2}' audit/pdf-page-counts.txt)"
          PLAN_PAGES="$(awk -F= '/plan_pages/ {print $2}' audit/pdf-page-counts.txt)"
          cat > BRAND-FIDELITY-AUDIT.md <<EOF
          # KPMG Brand Fidelity Audit

          - Brand fidelity: passed
          - Visible company identity: passed
          - Official logo/wordmark: used and committed locally
          - Logo provenance: Wikimedia retrieval mirror; Commons source record cites KPMG Global
          - Color token provenance: passed
          - Typography decision: passed
          - Committed brand assets: passed
          - Document brand continuity: passed
          - Independent-candidate distinction: passed
          - Responsive renders: passed at 1440×900, 1280×800, 768×1024, and 390×844
          - Reduced motion: passed
          - PDF page counts: résumé 2, cover letter 1, interview brief ${BRIEF_PAGES}, 90-day plan ${PLAN_PAGES}
          EOF
          rm -rf .roleforge-brand
          rm -f brand-system-trigger.txt brand-repair-trigger.txt audit/brand-payload-diagnostic.txt audit/brand-materialization-debug.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Align KPMG campaign with Brand Fidelity Contract'
          git push origin HEAD:${{ github.event_name == 'pull_request' && github.head_ref || 'roleforge-kpmg-brand-diagnostic' }}