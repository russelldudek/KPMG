name: Apply RoleForge Brand Fidelity

on:
  pull_request:
    branches: [main]
    paths:
      - '.roleforge-brand/**'
      - 'brand-repair-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Materialize audited campaign overlay
        run: |
          set -euxo pipefail
          ls -la .roleforge-brand
          cat .roleforge-brand/chunk-*.txt | tr -d '\n ' | base64 -d > /tmp/roleforge-overlay.tar.gz
          tar -tzf /tmp/roleforge-overlay.tar.gz | sed -n '1,120p'
          tar -xzf /tmp/roleforge-overlay.tar.gz -C .
          test -f brand-intelligence.md
          test -f brand-tokens.css
          test -f assets/brand/kpmg-logo.svg
          echo '--- brand tokens ---'
          sed -n '1,220p' brand-tokens.css
          echo '--- identity references ---'
          grep -nE 'kpmg-logo|Candidate vision|Russell Dudek' index.html | head -40
          grep -Eiq '#00338d|#005eb8|#0091da' brand-tokens.css
          grep -q 'assets/brand/kpmg-logo.svg' index.html
          grep -q 'Candidate vision for' index.html
          grep -Eq 'by Russell Dudek|Independent candidate' index.html
          grep -q 'View Cover Letter' resume.html
          grep -q 'View Resume' cover-letter.html
          grep -Rqs 'brand-tokens.css' index.html styles.css

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install render audit dependencies
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Render, validate, and regenerate PDFs
        run: |
          cat > /tmp/audit.js <<'JS'
          const { chromium } = require('playwright');
          const path = require('path');
          const fs = require('fs');
          const root = process.cwd();
          const fileUrl = (name) => 'file://' + path.join(root, name);
          (async () => {
            const browser = await chromium.launch({headless:true});
            const sizes = [[1440,900],[1280,800],[768,1024],[390,844]];
            fs.mkdirSync('audit/screenshots', {recursive:true});
            for (const [width,height] of sizes) {
              const page = await browser.newPage({viewport:{width,height}});
              await page.goto(fileUrl('index.html'), {waitUntil:'load'});
              const result = await page.evaluate(() => {
                const rootStyle = getComputedStyle(document.documentElement);
                const colors = ['rgb(0, 51, 141)','rgb(0, 94, 184)','rgb(0, 145, 218)'];
                return {
                  overflow: document.documentElement.scrollWidth > document.documentElement.clientWidth,
                  logo: !!document.querySelector('img[src="assets/brand/kpmg-logo.svg"]'),
                  qualifier: document.body.innerText.includes('Russell Dudek'),
                  primary: rootStyle.getPropertyValue('--brand-primary').trim().toLowerCase(),
                  blueSurfaces: [...document.querySelectorAll('*')].filter(el => {
                    const s = getComputedStyle(el);
                    return [s.backgroundColor, s.color, s.borderColor].some(v => colors.includes(v));
                  }).length
                };
              });
              console.log(`${width}x${height}`, result);
              if (result.overflow || !result.logo || !result.qualifier || result.blueSurfaces < 3) {
                throw new Error(`viewport ${width}x${height} failed: ${JSON.stringify(result)}`);
              }
              await page.screenshot({path:`audit/screenshots/index-${width}x${height}.png`, fullPage:true});
              await page.close();
            }
            const reducedContext = await browser.newContext({viewport:{width:1280,height:800}, reducedMotion:'reduce'});
            const reduced = await reducedContext.newPage();
            await reduced.goto(fileUrl('index.html'), {waitUntil:'load'});
            await reduced.waitForTimeout(250);
            const running = await reduced.evaluate(() => document.getAnimations().filter(a => a.playState === 'running').length);
            if (running !== 0) throw new Error(`reduced motion left ${running} running animations`);
            await reduced.screenshot({path:'audit/screenshots/index-reduced-motion.png', fullPage:true});
            await reducedContext.close();
            fs.mkdirSync('docs', {recursive:true});
            for (const [html,pdf] of [
              ['resume.html','docs/Russell-Dudek-KPMG-Resume.pdf'],
              ['cover-letter.html','docs/Russell-Dudek-KPMG-Cover-Letter.pdf'],
              ['interview-brief.html','docs/Russell-Dudek-KPMG-Interview-Brief.pdf'],
              ['90-day-plan.html','docs/Russell-Dudek-KPMG-90-Day-Plan.pdf']
            ]) {
              const page = await browser.newPage();
              await page.goto(fileUrl(html), {waitUntil:'load'});
              const webCheck = await page.evaluate(() => ({
                hasKpmg: document.body.innerText.includes('KPMG'),
                hasDownload: document.body.innerText.includes('Download PDF')
              }));
              if (!webCheck.hasKpmg || !webCheck.hasDownload) throw new Error(`${html} brand/download check failed`);
              await page.emulateMedia({media:'print'});
              await page.pdf({path:pdf, format:'Letter', printBackground:true, margin:{top:'0',right:'0',bottom:'0',left:'0'}});
              await page.close();
            }
            await browser.close();
          })().catch(err => { console.error(err); process.exit(1); });
          JS
          node /tmp/audit.js
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Resume.pdf | awk '/Pages/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Cover-Letter.pdf | awk '/Pages/ {print $2}')" = "1"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Interview-Brief.pdf | awk '/Pages/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-90-Day-Plan.pdf | awk '/Pages/ {print $2}')" = "2"

      - name: Commit complete brand-faithful campaign to PR branch
        run: |
          rm -rf .roleforge-brand
          rm -f brand-repair-trigger.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Align KPMG campaign with Brand Fidelity Contract'
          git push origin HEAD:${{ github.head_ref }}
