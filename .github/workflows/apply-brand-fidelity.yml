name: Apply RoleForge Brand Fidelity

on:
  pull_request:
    branches: [main]
    paths:
      - 'brand-system-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brand-and-audit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Build official KPMG brand layer
        run: |
          set -euo pipefail
          mkdir -p assets/brand
          curl -A 'Mozilla/5.0 RoleForge candidate campaign' --fail --location --retry 4 --retry-all-errors \
            'https://www.kpmguscareers.com/wp-content/themes/understrap-child-main/src/imgs/kpmg-header-logo.svg' \
            -o assets/brand/kpmg-logo.svg
          grep -qi '<svg' assets/brand/kpmg-logo.svg

          cat > brand-intelligence.md <<'EOF'
          # KPMG Brand Intelligence

          ## Identity and provenance
          - Official wordmark: `assets/brand/kpmg-logo.svg`
          - Official source: https://www.kpmguscareers.com/wp-content/themes/understrap-child-main/src/imgs/kpmg-header-logo.svg
          - Source context: KPMG US Careers header logo, used only for nominative identification of the target employer.
          - Visible-use decision: official logo above the fold and in campaign navigation; restrained logo treatment in printable artifacts. Every surface is labeled as independent candidate work by Russell Dudek.

          ## Color system
          - `#00338D` — source-sampled official KPMG primary blue from the public KPMG identity.
          - `#005EB8` — source-sampled supporting KPMG blue used in public digital identity.
          - `#0091DA` — source-sampled light KPMG blue used for highlights and data states.
          - `#E5F2F8`, `#F4F7FA`, `#FFFFFF` — candidate-neutral tints supporting accessibility and document readability.
          - No violet, pink, or generic RoleForge gradient is treated as KPMG brand color.

          ## Typography decision
          KPMG's public identity uses a disciplined neo-grotesque sans-serif character. Proprietary corporate font files are not copied or committed. The campaign uses `Arial Nova`, `Helvetica Neue`, Arial, and system sans-serif as licensed/system substitutes, reproducing the public character through restrained weight, generous scale, compact tracking, and editorial hierarchy. The substitute is not represented as an official KPMG font.

          ## Visual grammar
          - Strong KPMG blue fields balanced with white space.
          - Rectilinear frames and square-cornered surfaces echo the geometry of the official four-box wordmark.
          - Clear editorial hierarchy, thin rules, compact labels, and blue-spectrum data graphics.
          - Motion remains candidate-original and role-derived: the GenAI Proving Ground moves an experiment through proof stations and valid outcomes. The official logo is never animated, recolored, distorted, or combined into a candidate-created mark.

          ## Independent-work distinction
          This repository is an independent candidate campaign by Russell Dudek. It is not a KPMG publication and does not imply sponsorship, approval, employment, or endorsement.
          EOF

          cat > brand-tokens.css <<'EOF'
          :root{
            --brand-primary:#00338d;--brand-secondary:#005eb8;--brand-accent:#0091da;--brand-dark:#061f3f;--brand-pale:#e5f2f8;--brand-mist:#f4f7fa;--brand-light:#ffffff;--campaign-accent:#007c91;
            --ink:#061f3f;--ink-2:#173a63;--blue:#00338d;--blue-2:#005eb8;--violet:#005eb8;--pink:#0091da;--sky:#e5f2f8;--lav:#eef6fa;--ice:#f4f7fa;--paper:#ffffff;--line:#b8cadd;--muted:#51677d;--green:#007c91;--shadow:0 24px 70px rgba(0,51,141,.14);--radius-xl:8px;--radius-lg:5px;--radius-md:3px;
          }
          html{accent-color:var(--brand-primary)}body{font-family:"Arial Nova","Helvetica Neue",Arial,ui-sans-serif,sans-serif;background:var(--brand-mist)}body::before{background:linear-gradient(rgba(0,51,141,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,51,141,.035) 1px,transparent 1px);background-size:40px 40px}h1,h2,h3,.identity,.letter-meta{font-family:"Arial Nova","Helvetica Neue",Arial,ui-sans-serif,sans-serif}a:focus-visible,button:focus-visible,input:focus-visible{outline-color:var(--brand-accent)}
          .site-nav{background:rgba(255,255,255,.96);border-bottom:4px solid var(--brand-primary);backdrop-filter:blur(14px)}.site-nav::after{content:"";position:absolute;left:0;right:0;bottom:-4px;height:4px;background:linear-gradient(90deg,var(--brand-primary) 0 48%,var(--brand-secondary) 48% 76%,var(--brand-accent) 76%)}.brand.company-nav-lockup{gap:.9rem;color:var(--brand-dark)}.brand.company-nav-lockup img{width:94px;height:auto;display:block}.brand.company-nav-lockup>span{display:grid;gap:.06rem;padding-left:.85rem;border-left:1px solid var(--line)}.brand.company-nav-lockup b{font-size:.66rem;color:var(--brand-primary);letter-spacing:.12em;text-transform:uppercase}.brand.company-nav-lockup small{font-size:.72rem;color:var(--muted);font-weight:700}.nav-links a{border-radius:2px;color:var(--brand-dark)}.nav-links a:hover{background:var(--brand-pale);color:var(--brand-primary)}
          .hero{position:relative;background:linear-gradient(100deg,#fff 0 62%,var(--brand-pale) 62% 100%)}.hero::before{content:"";position:absolute;left:0;top:0;bottom:0;width:10px;background:linear-gradient(var(--brand-primary),var(--brand-secondary),var(--brand-accent))}.hero-company-lockup{display:flex;align-items:center;gap:1rem;margin:0 0 2.1rem;padding:1rem 1.05rem;border-left:6px solid var(--brand-primary);background:#fff;box-shadow:0 12px 34px rgba(0,51,141,.09);max-width:590px}.hero-company-lockup img{width:126px;height:auto;flex:0 0 auto}.hero-company-lockup div{display:grid;gap:.08rem;padding-left:1rem;border-left:1px solid var(--line)}.hero-company-lockup strong{color:var(--brand-primary);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase}.hero-company-lockup span{font-size:.95rem;font-weight:800;line-height:1.2}.hero-company-lockup small{color:var(--muted);font-size:.72rem}.hero-copy h1{color:var(--brand-primary)}.eyebrow{color:var(--brand-primary)}.eyebrow::before{border-radius:0;background:var(--brand-primary)}.btn{border-radius:2px}.btn-primary{background:var(--brand-primary);border-color:var(--brand-primary)}.btn-primary:hover{background:var(--brand-secondary)}.btn-secondary{color:var(--brand-primary);border-color:var(--brand-primary)}.hero-thesis span{color:var(--brand-secondary)}
          .proving-rig,.boundary-sheet,.brief-card,.score-item,.fact-box{border-radius:4px}.proving-rig{border:1px solid #9bb5d1;border-top:10px solid var(--brand-primary);background:linear-gradient(145deg,#fff 0%,#f3f8fb 60%,#dcecf5 100%)}.rig-topline,.sheet-head{background:var(--brand-primary)}.track-line,.system-line span{background:linear-gradient(90deg,var(--brand-primary),var(--brand-secondary),var(--brand-accent))}.specimen{border-color:var(--brand-primary);box-shadow:0 0 0 7px rgba(0,94,184,.15),0 0 22px rgba(0,94,184,.45)}.specimen i{background:var(--brand-accent)}.rig-trace i{background:linear-gradient(90deg,transparent,var(--brand-primary),var(--brand-accent),transparent)}.rig-run:hover{background:var(--brand-pale)}.moment-band{border-radius:0;border-top:7px solid var(--brand-primary)}.moment-band a:nth-child(1){background:var(--brand-primary);color:#fff}.moment-band a:nth-child(1) span,.moment-band a:nth-child(1) em{color:#dcecf8}.moment-band span{color:var(--brand-secondary)}.mandate-section{background:var(--brand-primary)}.boundary-section{background:linear-gradient(135deg,#dfeef6,#f7fafd)}.balance-board article div i{background:linear-gradient(90deg,var(--brand-primary) 0 48%,var(--brand-dark) 48% 52%,var(--brand-accent) 52%)}.boundary-sheet article>b{border-radius:2px;background:var(--brand-pale);color:var(--brand-primary)}.boundary-sheet article>span{color:var(--brand-secondary)}.outcome-tabs button[aria-selected="true"],.lab-tab[aria-selected="true"]{background:var(--brand-primary);color:#fff}.instrument-panel,.outcome-console{border-top:7px solid var(--brand-primary)}.site-footer{background:var(--brand-dark);border-top:7px solid var(--brand-accent)}
          .independent-candidate-note{padding:1rem max(1rem,calc((100vw - 1180px)/2));background:#fff;border-top:1px solid var(--line);font-size:.72rem;color:var(--muted);text-align:center}.document-company-lockup{display:flex;align-items:center;justify-content:flex-end;gap:.75rem;margin:0 0 .85rem auto;color:var(--brand-dark)}.document-company-lockup img{width:76px;height:auto}.document-company-lockup span{display:grid;padding-left:.7rem;border-left:1px solid var(--line);line-height:1.18}.document-company-lockup strong{font-size:.62rem;color:var(--brand-primary);letter-spacing:.1em;text-transform:uppercase}.document-company-lockup small{font-size:.62rem;color:var(--muted)}.print-page,.letter-page,.brief-page{border-top-color:var(--brand-primary)}.resume-header,.letter-head,.section-head{border-bottom-color:var(--brand-primary)}.resume-section h2,.brief-card h2,.score-item small{color:var(--brand-primary)}.capability{border-radius:2px;background:var(--brand-pale);border-color:#b9d1e2}.download-link{background:var(--brand-primary)!important;color:#fff!important;border-color:var(--brand-primary)!important}.brand-mark{display:none!important}
          @media(max-width:860px){.brand.company-nav-lockup img{width:78px}.brand.company-nav-lockup>span{display:none}.hero{background:#fff}.hero-company-lockup{max-width:none}.hero-company-lockup img{width:104px}}@media(max-width:520px){.hero-company-lockup{align-items:flex-start;gap:.7rem;padding:.85rem}.hero-company-lockup img{width:88px}.hero-company-lockup div{padding-left:.7rem}.document-company-lockup{justify-content:flex-start}.document-company-lockup img{width:64px}}
          @media print{.document-company-lockup{margin-bottom:3mm}.document-company-lockup img{width:24mm}.document-company-lockup strong,.document-company-lockup small{font-size:6.5pt}.print-page,.letter-page,.brief-page{border-top:2.2mm solid var(--brand-primary)!important}.independent-candidate-note{display:none!important}}
          @media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;animation:none!important;transition:none!important}}
          EOF

          python - <<'PY'
          from pathlib import Path
          import re
          files=['index.html','decision-lab.html','resume.html','cover-letter.html','interview-brief.html','90-day-plan.html']
          nav='<a class="brand company-nav-lockup" href="index.html"><img src="assets/brand/kpmg-logo.svg" alt="KPMG"><span><b>Candidate vision</b><small>by Russell Dudek</small></span></a>'
          doc='<div class="document-company-lockup"><img src="assets/brand/kpmg-logo.svg" alt="KPMG"><span><strong>Candidate vision for Associate Director, Technology Innovation</strong><small>Independent work by Russell Dudek</small></span></div>'
          note='<div class="independent-candidate-note">Independent candidate work by Russell Dudek for discussion with KPMG. Not a KPMG publication; no sponsorship, approval, or endorsement is implied.</div>'
          for name in files:
              p=Path(name); t=p.read_text(encoding='utf-8')
              if 'brand-tokens.css' not in t:t=re.sub(r'(<link[^>]+href=["\']styles\.css["\'][^>]*>)',r'\1<link rel="stylesheet" href="brand-tokens.css">',t,count=1)
              t=re.sub(r'<a class="brand(?: [^"]*)?" href="index\.html">.*?</a>',nav,t,count=1,flags=re.S)
              if name=='index.html':
                  t=t.replace('<link rel="icon" href="assets/proving-ground-mark.svg" type="image/svg+xml">','<link rel="icon" href="assets/brand/kpmg-logo.svg" type="image/svg+xml">')
                  if 'hero-company-lockup' not in t:t=t.replace('<div class="hero-copy">','<div class="hero-copy">\n<div class="hero-company-lockup"><img src="assets/brand/kpmg-logo.svg" alt="KPMG"><div><strong>Candidate vision for</strong><span>Associate Director, Technology Innovation</span><small>Independent work by Russell Dudek</small></div></div>',1)
              elif 'document-company-lockup' not in t:t=re.sub(r'(<main\b[^>]*>)',r'\1'+doc,t,count=1)
              if 'independent-candidate-note' not in t:t=t.replace('</body>',note+'</body>')
              p.write_text(t,encoding='utf-8')
          PY

          rm -f brand-system-trigger.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Apply official KPMG brand system across campaign'
          git push origin HEAD:${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install browser and PDF audit tools
        run: |
          npm install --prefix /tmp/kpmg-audit playwright
          /tmp/kpmg-audit/node_modules/.bin/playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Render full campaign and regenerate PDFs
        run: |
          cat > /tmp/kpmg-audit.js <<'JS'
          const { chromium } = require('/tmp/kpmg-audit/node_modules/playwright');
          const path = require('path'); const fs = require('fs'); const root=process.cwd(); const fileUrl=n=>'file://'+path.join(root,n);
          (async()=>{
            ['brand-intelligence.md','brand-tokens.css','assets/brand/kpmg-logo.svg','index.html','decision-lab.html','resume.html','cover-letter.html','interview-brief.html','90-day-plan.html'].forEach(f=>{if(!fs.existsSync(path.join(root,f)))throw new Error(`missing ${f}`)});
            const browser=await chromium.launch({headless:true}); const sizes=[[1440,900],[1280,800],[768,1024],[390,844]]; fs.mkdirSync('audit/screenshots',{recursive:true});
            for(const [width,height] of sizes){const page=await browser.newPage({viewport:{width,height}});const errors=[];page.on('pageerror',e=>errors.push(String(e)));await page.goto(fileUrl('index.html'),{waitUntil:'load'});await page.waitForTimeout(400);const r=await page.evaluate(()=>{const logo=document.querySelector('.hero-company-lockup img');const rect=logo?.getBoundingClientRect();return{overflow:document.documentElement.scrollWidth>document.documentElement.clientWidth,logoLoaded:!!logo&&logo.complete&&logo.naturalWidth>0,logoAboveFold:!!rect&&rect.top>=0&&rect.bottom<=innerHeight,qualifier:/Independent work by Russell Dudek/i.test(document.body.innerText),primary:getComputedStyle(document.documentElement).getPropertyValue('--brand-primary').trim().toLowerCase()}});console.log(`${width}x${height}`,r,errors);if(r.overflow||!r.logoLoaded||!r.logoAboveFold||!r.qualifier||r.primary!=='#00338d'||errors.length)throw new Error(`viewport failed ${JSON.stringify({r,errors})}`);await page.screenshot({path:`audit/screenshots/index-${width}x${height}.png`,fullPage:true});await page.close()}
            const c=await browser.newContext({viewport:{width:1280,height:800},reducedMotion:'reduce'});const p=await c.newPage();await p.goto(fileUrl('index.html'),{waitUntil:'load'});await p.waitForTimeout(300);const running=await p.evaluate(()=>document.getAnimations().filter(a=>a.playState==='running').length);if(running!==0)throw new Error(`reduced motion left ${running} animations`);await p.screenshot({path:'audit/screenshots/index-reduced-motion.png',fullPage:true});await c.close();
            fs.mkdirSync('docs',{recursive:true});for(const [html,pdf] of [['resume.html','docs/Russell-Dudek-KPMG-Resume.pdf'],['cover-letter.html','docs/Russell-Dudek-KPMG-Cover-Letter.pdf'],['interview-brief.html','docs/Russell-Dudek-KPMG-Interview-Brief.pdf'],['90-day-plan.html','docs/Russell-Dudek-KPMG-90-Day-Plan.pdf']]){const page=await browser.newPage();await page.goto(fileUrl(html),{waitUntil:'load'});const check=await page.evaluate(()=>({logo:!!document.querySelector('img[src="assets/brand/kpmg-logo.svg"]'),download:document.body.innerText.includes('Download PDF'),company:document.body.innerText.includes('KPMG')}));if(!check.logo||!check.download||!check.company)throw new Error(`${html} failed ${JSON.stringify(check)}`);await page.emulateMedia({media:'print'});await page.pdf({path:pdf,format:'Letter',printBackground:true,margin:{top:'0',right:'0',bottom:'0',left:'0'}});await page.close()}await browser.close()
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node /tmp/kpmg-audit.js
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Resume.pdf | awk '/Pages/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Cover-Letter.pdf | awk '/Pages/ {print $2}')" = "1"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-Interview-Brief.pdf | awk '/Pages/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-KPMG-90-Day-Plan.pdf | awk '/Pages/ {print $2}')" = "2"

      - name: Commit verified renders and PDFs
        run: |
          git add audit/screenshots docs
          git diff --cached --quiet || git commit -m 'Verify KPMG brand renders and PDF contracts'
          git push origin HEAD:${{ github.head_ref }}
