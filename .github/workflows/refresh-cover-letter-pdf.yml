name: Refresh application document PDFs

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  render-and-verify:
    if: github.head_ref == 'agent/align-cover-letter-header'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Install document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint poppler-utils
      - name: Render and verify application documents
        run: |
          mkdir -p docs qa
          weasyprint resume.html docs/Russell-Dudek-KPMG-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-KPMG-Cover-Letter.pdf
          resume_pages=$(pdfinfo docs/Russell-Dudek-KPMG-Resume.pdf | awk '/Pages/ {print $2}')
          cover_pages=$(pdfinfo docs/Russell-Dudek-KPMG-Cover-Letter.pdf | awk '/Pages/ {print $2}')
          test "$resume_pages" = "2"
          test "$cover_pages" = "1"
          pdftotext docs/Russell-Dudek-KPMG-Resume.pdf /tmp/resume.txt
          pdftotext docs/Russell-Dudek-KPMG-Cover-Letter.pdf /tmp/cover-letter.txt
          for text in /tmp/resume.txt /tmp/cover-letter.txt; do
            grep -q 'Russell Dudek' "$text"
            grep -q 'Pittsburgh, Pennsylvania' "$text"
            grep -q '412.287.8640' "$text"
            grep -q 'russelldudek@gmail.com' "$text"
            grep -q 'linkedin.com/in/russelldudek' "$text"
            grep -q 'russelldudek.github.io/KPMG/' "$text"
          done
          pdftoppm -f 1 -l 1 -png -singlefile -r 120 docs/Russell-Dudek-KPMG-Resume.pdf qa/resume-header-preview
          pdftoppm -png -singlefile -r 120 docs/Russell-Dudek-KPMG-Cover-Letter.pdf qa/cover-letter-header-preview
          python - <<'PY'
          import json
          from pathlib import Path
          Path('qa/application-header-audit.json').write_text(json.dumps({
              'sharedHeaderComponent': 'resume-header resume-header-primary',
              'horizontalPagePaddingInches': 0.52,
              'duplicateTargetLineRemovedFromCoverLetter': True,
              'contactSeparatorsPresent': True,
              'resumePages': 2,
              'coverLetterPages': 1,
              'contactBlockPresentInBoth': True,
              'campaignUrlPresentInBoth': True,
              'passed': True
          }, indent=2) + '\n')
          PY
      - name: Upload visual proof
        uses: actions/upload-artifact@v4
        with:
          name: application-header-preview
          path: |
            docs/Russell-Dudek-KPMG-Resume.pdf
            docs/Russell-Dudek-KPMG-Cover-Letter.pdf
            qa/resume-header-preview.png
            qa/cover-letter-header-preview.png
            qa/application-header-audit.json
      - name: Commit verified PDFs to audit branch
        run: |
          rm -f .header-alignment-trigger .header-alignment-preview-trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish aligned application document headers and PDFs' || exit 0
          git push origin HEAD:${{ github.head_ref }}
